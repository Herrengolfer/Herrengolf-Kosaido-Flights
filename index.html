<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Herrengolf Kosaido FINAL</title>

<style>
body{font-family:-apple-system,Arial;background:#f5f5f5;margin:0;padding:10px}
.wrap{max-width:1000px;margin:auto}
.card{background:white;padding:15px;margin-bottom:15px;border-radius:16px;box-shadow:0 6px 20px rgba(0,0,0,0.08)}

.players{display:flex;flex-wrap:wrap;gap:6px}
.player{padding:8px 10px;border-radius:999px;border:1px solid #ddd;cursor:pointer}
.player.active{background:#e6f7ec;border-color:#bde5c8}

.score-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.score-card{background:#fafafa;padding:10px;border-radius:12px;text-align:center}
.score-card input{width:100%;font-size:18px;padding:8px;text-align:center}

.live{margin-top:10px;padding:10px;background:#f0f0f0;border-radius:10px}

button{width:100%;padding:12px;border:none;border-radius:12px;background:#d4af37;margin-top:10px;font-weight:bold}
</style>
</head>

<body>
<div class="wrap">

<div class="card">
<h3>Spieler auswählen</h3>
<div id="players" class="players"></div>
<button onclick="generate()">Runde generieren</button>
</div>

<div id="output"></div>

<div class="card">
<h3>Ranking</h3>
<div id="ranking"></div>
</div>

</div>

<script>

const allPlayers=["Luci","Dolli","Carl","Adi","Sascha","Martin","Thomas Wimmer"];
let selected=new Set();
let stats={};

allPlayers.forEach(p=>stats[p]={wins:0,losses:0,rounds:0});

function renderPlayers(){
  const el=document.getElementById("players");
  el.innerHTML="";
  allPlayers.forEach(p=>{
    const btn=document.createElement("div");
    btn.className="player"+(selected.has(p)?" active":"");
    btn.innerText=p;
    btn.onclick=()=>toggle(p);
    el.appendChild(btn);
  });
}

function toggle(p){
  if(selected.has(p))selected.delete(p);
  else selected.add(p);
  renderPlayers();
}

function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
}

function createGroups(players){
  let arr=[...players];
  shuffle(arr);
  return [arr.slice(0,4),arr.slice(4)];
}

function generate(){
  const players=[...selected];
  if(players.length<3){alert("mind 3");return;}
  const groups=createGroups(players);

  document.getElementById("output").innerHTML=groups.map((g,i)=>`
    <div class="card">
      <h3>Flight ${i+1}</h3>

      <div class="score-grid">
        ${g.map(p=>`
          <div class="score-card">
            ${p}
            <input type="number" id="s-${i}-${p}"
              oninput="live(${i},${JSON.stringify(g)})">
          </div>
        `).join("")}
      </div>

      <div id="live-${i}" class="live">Live Ranking...</div>

      <button onclick="save(${i},${JSON.stringify(g)})">Speichern</button>
    </div>
  `).join("");
}

function live(i,g){
  let scores=g.map(p=>{
    let v=document.getElementById(`s-${i}-${p}`).value;
    return {p,pts:Number(v||0)};
  });

  if(scores.every(s=>s.pts==0)){
    document.getElementById(`live-${i}`).innerHTML="Live Ranking...";
    return;
  }

  scores.sort((a,b)=>b.pts-a.pts);

  document.getElementById(`live-${i}`).innerHTML=
    scores.map((s,idx)=>`
      ${idx==0?"🥇":idx==1?"🥈":idx==2?"🥉":idx==scores.length-1?"💀":""}
      ${s.p} - ${s.pts}<br>
    `).join("");
}

function save(i,g){
  let code=prompt("Admin-Code?");
  if(code!="Kosaido"){alert("Kein Zugriff");return;}

  let scores=g.map(p=>{
    let v=document.getElementById(`s-${i}-${p}`).value;
    return {p,pts:Number(v||0)};
  });

  scores.sort((a,b)=>b.pts-a.pts);

  let winner=scores[0].p;
  let loser=scores[scores.length-1].p;

  stats[winner].wins++;
  stats[loser].losses++;
  g.forEach(p=>stats[p].rounds++);

  updateRanking();

  alert("🏆 "+winner+"\n💀 "+loser);
}

function updateRanking(){
  let arr=Object.entries(stats);
  arr.sort((a,b)=>b[1].wins-a[1].wins);

  document.getElementById("ranking").innerHTML=
    arr.map(([name,s])=>`
      ${name} - Siege: ${s.wins} / Runden: ${s.rounds}<br>
    `).join("");
}

renderPlayers();
updateRanking();

</script>
</body>
</html>
