<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Herrengolf Kosaido</title>
<style>
:root{
  --bg:#f7f8fa;
  --panel:#ffffff;
  --border:#e8ebf0;
  --text:#0f172a;
  --muted:#6b7280;
  --green:#22c55e;
  --red:#ef4444;
  --gold:#d4a72c;
}
body{margin:0;font-family:Inter,system-ui;background:var(--bg);color:var(--text)}
.wrap{max-width:1200px;margin:auto;padding:20px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:20px}
h1,h2{margin:0 0 10px}
.players{display:flex;flex-wrap:wrap;gap:8px}
.player{padding:8px 12px;border-radius:999px;border:1px solid var(--border);cursor:pointer;transition:.2s}
.player.active{background:#eefaf2;border-color:#cfead7}
button{padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:white;cursor:pointer;margin:2px}
.btn-primary{background:var(--green);color:white;border:none}
.flight{border:1px solid var(--border);padding:12px;border-radius:12px;margin-bottom:12px}
.chip{display:inline-block;padding:6px 10px;border:1px solid var(--border);border-radius:999px;margin:2px}
.chip.winner{background:#eefaf2;color:#157347;font-weight:600}
.chip.loser{background:#fff5f5;color:#b42318}
.chip.lady{background:#fff8e7;color:#8a6512}
.badge{display:inline-block;padding:6px 10px;border-radius:999px;margin-right:6px;font-size:12px}
.badge.gold{background:#fff8e7;color:#8a6512}
.badge.red{background:#fff5f5;color:#b42318}
</style>
</head>
<body>
<div class="wrap">
<h1>Herrengolf Kosaido</h1>
<div class="card">
<h2>🏆 Titel</h2>
<div id="titles"></div>
</div>
<div class="card">
<h2>Spieler</h2>
<div id="players" class="players"></div>
<br>
<button class="btn-primary" onclick="generateRound()">Runde generieren</button>
</div>
<div class="card">
<h2>Flights & Ergebnisse</h2>
<div id="output"></div>
</div>
</div>
<script>
const allPlayers=["Luci","Dolli","Dickie","Thomas Wimmer","Thomas Schneider","Jörg","Martin","Carsten","Felix","Carl","Sascha"];
let selected=new Set();
let stats={};
let flightStates={};
allPlayers.forEach(p=>stats[p]={wins:0,losses:0,ladies:0});
function renderPlayers(){
  const el=document.getElementById("players");
  el.innerHTML="";
  allPlayers.forEach(p=>{
    const btn=document.createElement("div");
    btn.className="player"+(selected.has(p)?" active":"");
    btn.innerText=p;
    btn.onclick=()=>toggle(p);
    el.appendChild(btn);
  });
}
function toggle(p){
  if(selected.has(p))selected.delete(p);
  else selected.add(p);
  renderPlayers();
}
function createGroups(players){
  players=[...players].sort(()=>Math.random()-0.5);
  const groups=[];
  while(players.length)groups.push(players.splice(0,4));
  return groups;
}
function renderTitles(){
  let ladyKing="",underdog="",maxLady=0,maxLoss=0;
  for(let p in stats){
    if(stats[p].ladies>maxLady){maxLady=stats[p].ladies;ladyKing=p}
    if(stats[p].losses>maxLoss){maxLoss=stats[p].losses;underdog=p}
  }
  document.getElementById("titles").innerHTML=
    `<span class="badge gold">👑 Lady King: ${ladyKing||"-"}</span>
     <span class="badge red">💀 Underdog: ${underdog||"-"}</span>`;
}
function generateRound(){
  const players=[...selected];
  if(players.length<3){alert("Mindestens 3 Spieler");return;}
  const groups=createGroups(players);
  const out=document.getElementById("output");
  out.innerHTML=groups.map((g,i)=>{
    flightStates[i]={winner:null,loser:null,ladies:[]};
    return `
    <div class="flight">
      <strong>Flight ${i+1}</strong><br>
      ${g.map(p=>`<span class="chip">${p}</span>`).join("")}
      <div>Gewinner: ${g.map(p=>`<button onclick="setWinner('${p}')">${p}</button>`).join("")}</div>
      <div>Verlierer: ${g.map(p=>`<button onclick="setLoser('${p}')">${p}</button>`).join("")}</div>
      <div>Ladys: ${g.map(p=>`<button onclick="addLady('${p}')">${p}</button>`).join("")}</div>
    </div>`;
  }).join("");
}
function setWinner(p){stats[p].wins++;renderTitles();}
function setLoser(p){stats[p].losses++;renderTitles();}
function addLady(p){stats[p].ladies++;renderTitles();}
renderPlayers();
renderTitles();
</script>
</body>
</html>
