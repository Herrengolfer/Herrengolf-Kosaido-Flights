<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Herrengolf Kosaido CLOUD</title>

<style>
body{font-family:-apple-system,Arial;background:#f5f5f5;margin:0;padding:10px}
.wrap{max-width:1000px;margin:auto}
.card{background:white;padding:15px;margin-bottom:15px;border-radius:16px;box-shadow:0 6px 20px rgba(0,0,0,0.08)}

.players{display:flex;flex-wrap:wrap;gap:6px}
.player{padding:8px 10px;border-radius:999px;border:1px solid #ddd;cursor:pointer}
.player.active{background:#e6f7ec;border-color:#bde5c8}

.score-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.score-card{background:#fafafa;padding:10px;border-radius:12px;text-align:center}
.score-card input{width:100%;font-size:18px;padding:8px;text-align:center}

.live{margin-top:10px;padding:10px;background:#f0f0f0;border-radius:10px}
button{width:100%;padding:12px;border:none;border-radius:12px;background:#d4af37;margin-top:10px;font-weight:bold}
</style>
</head>

<body>
<div class="wrap">

<div class="card">
<h3>Spieler auswählen</h3>
<div id="players" class="players"></div>
<button onclick="generate()">Runde generieren</button>
</div>

<div id="output"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "DEIN_API_KEY",
  authDomain: "DEIN_PROJECT.firebaseapp.com",
  projectId: "DEIN_PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const allPlayers=["Luci","Dolli","Carl","Adi","Sascha","Martin","Thomas"];
let selected=new Set();

function renderPlayers(){
  const el=document.getElementById("players");
  el.innerHTML="";
  allPlayers.forEach(p=>{
    const btn=document.createElement("div");
    btn.className="player"+(selected.has(p)?" active":"");
    btn.innerText=p;
    btn.onclick=()=>toggle(p);
    el.appendChild(btn);
  });
}

function toggle(p){
  if(selected.has(p))selected.delete(p);
  else selected.add(p);
  renderPlayers();
}

function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
}

function generate(){
  const players=[...selected];
  if(players.length<3){alert("mind 3");return;}

  shuffle(players);

  document.getElementById("output").innerHTML=`
    <div class="card">
      ${players.map(p=>`
        <div class="score-card">
          ${p}
          <input type="number" id="s-${p}" oninput="live(${JSON.stringify(players)})">
        </div>
      `).join("")}

      <div id="live" class="live">Live Ranking...</div>
      <button onclick="save(${JSON.stringify(players)})">Speichern</button>
    </div>
  `;
}

window.live=function(group){
  let scores=group.map(p=>{
    let v=document.getElementById("s-"+p).value;
    return {p,pts:Number(v||0)};
  });

  scores.sort((a,b)=>b.pts-a.pts);

  document.getElementById("live").innerHTML=
    scores.map((s,i)=>`${i==0?"🥇":i==scores.length-1?"💀":""} ${s.p} - ${s.pts}<br>`).join("");
}

window.save=async function(group){
  let code=prompt("Admin-Code?");
  if(code!="Kosaido"){alert("No");return;}

  let scores=group.map(p=>{
    let v=document.getElementById("s-"+p).value;
    return {p,pts:Number(v||0)};
  });

  scores.sort((a,b)=>b.pts-a.pts);

  await addDoc(collection(db,"rounds"),{
    date:new Date().toLocaleDateString(),
    scores
  });

  alert("Gespeichert in Cloud");
}

renderPlayers();

</script>
</body>
</html>
