<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Herrengolf FINAL ELITE</title>
<style>
body{font-family:Arial;background:#f5f5f5;padding:20px}
.card{background:#fff;padding:15px;margin-bottom:20px;border-radius:10px}
.player{display:inline-block;padding:6px 10px;margin:4px;border:1px solid #ccc;border-radius:8px;cursor:pointer}
.selected{background:#4caf50;color:white}
input{width:60px}
</style>
</head>
<body>

<div class="card">
<h2>Herrengolf FINAL ELITE</h2>
<div id="players"></div>
<button onclick="generateRound()">Runde generieren</button>
</div>

<div class="card">
<h2>Scores (Stableford)</h2>
<div id="scores"></div>
<button onclick="finishRound()">Runde abschließen</button>
</div>

<div class="card">
<h2>Runden</h2>
<div id="rounds"></div>
</div>

<div class="card">
<h2>Ranking</h2>
<div id="ranking"></div>
</div>

<script>

// ===== CONFIG FIREBASE (OPTIONAL) =====
// -> hier deine Firebase Config einfügen falls benötigt

// ===== CORE =====
const getFlights = r => r?.flights ? Object.values(r.flights) : [];
const getPlayers = f => Array.isArray(f?.players) ? f.players : [];

// ===== GAME LOGIC =====
function stableford(par, strokes){
  const diff = strokes - par;
  if(diff <= -3) return 5;
  if(diff == -2) return 4;
  if(diff == -1) return 3;
  if(diff == 0) return 2;
  if(diff == 1) return 1;
  return 0;
}

// ===== STATE =====
const allPlayers = ["Carl","Luci","Dolli","Jörg","Martin","Sascha","Markus"];
const handicaps = {Carl:10,Luci:18,Dolli:20,Jörg:12,Martin:15,Sascha:22,Markus:25};

let selected = [];
let rounds = JSON.parse(localStorage.getItem("rounds")||"[]");
let currentRound = null;

// ===== UI =====
function renderPlayers(){
  players.innerHTML = allPlayers.map(p=>`
    <span class="player ${selected.includes(p)?"selected":""}" onclick="toggle('${p}')">${p} (HCP ${handicaps[p]})</span>
  `).join("");
}

function toggle(p){
  selected.includes(p)
    ? selected = selected.filter(x=>x!==p)
    : selected.push(p);
  renderPlayers();
}

// ===== GENERATE =====
function generateRound(){
  if(selected.length<3) return alert("mind. 3 Spieler");

  const shuffled=[...selected].sort(()=>Math.random()-0.5);

  currentRound = {
    date:new Date().toLocaleDateString(),
    ntpHole:[2,6,8][Math.floor(Math.random()*3)],
    ntpWinner:"",
    flights:{
      f1:{players:shuffled,scores:{}}
    }
  };

  renderScores();
}

// ===== SCORING =====
function renderScores(){
  if(!currentRound) return;

  const f = getFlights(currentRound)[0];
  const players = getPlayers(f);

  scores.innerHTML = players.map(p=>`
    <div>${p}: <input type="number" placeholder="Schläge" onchange="setScore('${p}',this.value)"></div>
  `).join("");
}

function setScore(player,val){
  const f = getFlights(currentRound)[0];
  f.scores[player] = Number(val);
}

// ===== FINISH =====
function finishRound(){
  const f = getFlights(currentRound)[0];
  const players = getPlayers(f);

  const results = players.map(p=>{
    const gross = f.scores[p] || 0;
    const hcp = Math.round(handicaps[p]/3);
    const net = gross - hcp;

    return {
      player:p,
      gross,
      net,
      grossSF: stableford(4,gross),
      netSF: stableford(4,net)
    };
  });

  // Netto winner
  results.sort((a,b)=>b.netSF-a.netSF);
  f.winner = results[0].player;

  // Brutto winner
  results.sort((a,b)=>b.grossSF-a.grossSF);
  f.grossWinner = results[0].player;

  rounds.unshift(currentRound);
  localStorage.setItem("rounds",JSON.stringify(rounds));

  currentRound=null;
  renderAll();
}

// ===== RENDER =====
function renderRounds(){
  roundsEl.innerHTML = rounds.map(r=>`
    <div class="card">
      ${r.date}<br>
      🎯 NTP Loch ${r.ntpHole}<br>
      ${getFlights(r).map(f=>`
        Flight: ${getPlayers(f).join(", ")}<br>
        🟢 Netto: ${f.winner}<br>
        🔵 Brutto: ${f.grossWinner}
      `).join("")}
    </div>
  `).join("");
}

// ===== RANKING =====
function renderRanking(){
  const stats = {};
  allPlayers.forEach(p=>stats[p]={net:0,gross:0});

  rounds.forEach(r=>{
    getFlights(r).forEach(f=>{
      if(stats[f.winner]) stats[f.winner].net++;
      if(stats[f.grossWinner]) stats[f.grossWinner].gross++;
    });
  });

  ranking.innerHTML = Object.entries(stats)
    .sort((a,b)=>b[1].net-a[1].net)
    .map(([p,s])=>`${p} | Netto:${s.net} | Brutto:${s.gross}`)
    .join("<br>");
}

// ===== INIT =====
function renderAll(){
  renderPlayers();
  renderRounds();
  renderRanking();
}

renderAll();

</script>

</body>
</html>
