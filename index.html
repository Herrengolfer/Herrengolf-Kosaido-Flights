<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Herrengolf PRO+ Cloud</title>

<style>
body{margin:0;font-family:Inter,sans-serif;background:#f4f6f8;color:#111}
.wrap{max-width:1200px;margin:auto;padding:20px}
.card{background:#fff;border-radius:18px;padding:18px;margin-bottom:18px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
h2{margin:0 0 12px}
.badge{display:inline-block;padding:6px 10px;border-radius:999px;background:#eef2ff;margin:4px}
.row{display:flex;gap:6px;flex-wrap:wrap}
input{width:45px;padding:6px;border-radius:8px;border:1px solid #ccc;text-align:center}
button{padding:10px 16px;border-radius:12px;border:none;background:#fbbf24;font-weight:700;cursor:pointer}
.leader{color:#16a34a;font-weight:700}
.loser{color:#dc2626}
.match{font-size:18px;font-weight:700;margin-top:10px}
</style>
</head>

<body>
<div class="wrap">

<div class="card">
<h2>Spieler</h2>
<div id="players"></div>
</div>

<div class="card">
<h2>Score Eingabe (Netto Stableford)</h2>
<div id="scores"></div>
<button onclick="save()">💾 Speichern</button>
</div>

<div class="card">
<h2>Live Ranking</h2>
<div id="ranking"></div>
</div>

<div class="card">
<h2>Matchplay</h2>
<div id="match"></div>
</div>

<div class="card">
<h2>Historie</h2>
<div id="history"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "DEIN_API_KEY",
  authDomain: "DEIN_DOMAIN",
  projectId: "DEIN_PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const players=["Luci","Dolli","Dickie","Thomas Wimmer","Adi","Carl","Martin"];

const hcp={
"Luci":11,"Dolli":16,"Dickie":21,"Thomas Wimmer":19,"Adi":19,"Carl":10,"Martin":18
};

const pars=[5,3,4,4,4,3,4,3,4];
const strokeIndex=[1,7,3,5,9,15,11,17,13];

let scores={};
players.forEach(p=>scores[p]=Array(9).fill(null));

document.getElementById("players").innerHTML=
players.map(p=>`<span class="badge">${p} (${hcp[p]})</span>`).join("");

let html="";
players.forEach(p=>{
 html+=`<div><b>${p}</b><div class="row">`;
 for(let i=0;i<9;i++){
  html+=`<input type="number" onchange="setScore('${p}',${i},this.value)">`;
 }
 html+="</div></div><br>";
});
document.getElementById("scores").innerHTML=html;

function strokesForHole(hcp,index){
 let base=Math.floor(hcp/18);
 let rest=hcp%18;
 return index<=rest?base+1:base;
}

function stableford(par,score){
 let d=score-par;
 if(d<=-3)return 5;
 if(d==-2)return 4;
 if(d==-1)return 3;
 if(d==0)return 2;
 if(d==1)return 1;
 return 0;
}

window.setScore=(p,i,val)=>{
 scores[p][i]=Number(val);
 update();
};

function update(){

 let mp={}, sf={};
 players.forEach(p=>{mp[p]=0; sf[p]=0});

 let holes=0;

 for(let h=0;h<9;h++){
  if(!players.every(p=>scores[p][h]!=null)) break;
  holes++;

  let best=-1, winners=[];

  players.forEach(p=>{
    let net=scores[p][h]-strokesForHole(hcp[p],strokeIndex[h]);
    let pts=stableford(pars[h],net);
    sf[p]+=pts;

    if(pts>best){best=pts; winners=[p]}
    else if(pts===best){winners.push(p)}
  });

  winners.forEach(w=>mp[w]++);
 }

 let ranking=players.map(p=>({name:p,sf:sf[p],mp:mp[p]}))
 .sort((a,b)=>b.sf-a.sf||b.mp-a.mp);

 document.getElementById("ranking").innerHTML=
 ranking.map((r,i)=>`<div class="${i===0?'leader':''} ${i===ranking.length-1?'loser':''}">
 ${i+1}. ${r.name} – ${r.sf} SF / ${r.mp} LP</div>`).join("");

 if(ranking.length>=2){
  let diff=ranking[0].mp-ranking[1].mp;
  let rem=9-holes;
  let text="All square";
  if(diff>0){
    text=diff>rem?`${ranking[0].name} dormie ${diff}`:`${ranking[0].name} ${diff} auf`;
  }
  document.getElementById("match").innerHTML=`<div class="match">${text}</div>`;
 }
}

window.save=async()=>{
 const pw=prompt("Admin Code?");
 if(pw!=="Kosaido"){alert("Kein Zugriff");return;}

 const data={
  date:new Date().toLocaleDateString(),
  scores:Object.fromEntries(players.map(p=>[p,[...scores[p]]]))
 };

 await addDoc(collection(db,"rounds"),data);
 alert("Gespeichert!");
 loadHistory();
};

async function loadHistory(){
 const snap=await getDocs(collection(db,"rounds"));
 document.getElementById("history").innerHTML=
 snap.docs.map(d=>{
  const r=d.data();
  return `<div>${r.date}</div>`;
 }).join("");
}

loadHistory();

</script>
</body>
</html>
